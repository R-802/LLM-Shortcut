# Each entry = one route (API + fixed model). Health scoring picks order; max_attempts caps tries.
# More routes = better failover when a model hits quota; too many similar routes add little benefit.
cooldown_seconds: 300
max_attempts: 5

providers:
  fast:
    # Groq first — most reliable in logs when Gemini quota is exhausted.
    - id: groq-llama-8b
      litellm_model: groq/llama-3.1-8b-instant
      env_key: GROQ_API_KEY
      timeout_s: 25
      max_tokens: 2048
    - id: groq-llama
      litellm_model: groq/llama-3.3-70b-versatile
      env_key: GROQ_API_KEY
      timeout_s: 30
      max_tokens: 2048
    - id: gemini-flash-lite
      litellm_model: gemini/gemini-2.5-flash-lite
      env_key: GEMINI_API_KEY
      supports_vision: true
      timeout_s: 30
      max_tokens: 2048
    - id: gemini-flash
      litellm_model: gemini/gemini-2.5-flash
      env_key: GEMINI_API_KEY
      supports_vision: true
      timeout_s: 30
      max_tokens: 2048
    - id: openrouter-llama-free
      litellm_model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      env_key: OPENROUTER_API_KEY
      timeout_s: 60
      max_tokens: 2048
    - id: openrouter-gemma-free
      litellm_model: openrouter/google/gemma-2-9b-it:free
      env_key: OPENROUTER_API_KEY
      timeout_s: 60
      max_tokens: 2048

  balanced:
    - id: gemini-flash-balanced
      litellm_model: gemini/gemini-2.5-flash
      env_key: GEMINI_API_KEY
      supports_vision: true
      timeout_s: 45
      max_tokens: 4096
    - id: groq-llama-balanced
      litellm_model: groq/llama-3.3-70b-versatile
      env_key: GROQ_API_KEY
      timeout_s: 35
      max_tokens: 4096
    - id: hf-gpt-oss
      litellm_model: huggingface/openai/gpt-oss-120b
      env_key: HF_TOKEN
      timeout_s: 60
      max_tokens: 4096
    - id: hf-qwen-72b
      litellm_model: huggingface/Qwen/Qwen2.5-72B-Instruct
      env_key: HF_TOKEN
      timeout_s: 90
      max_tokens: 4096
    - id: openrouter-deepseek
      litellm_model: openrouter/deepseek/deepseek-chat
      env_key: OPENROUTER_API_KEY
      timeout_s: 60
      max_tokens: 4096
    - id: openrouter-qwen
      litellm_model: openrouter/qwen/qwen-2.5-72b-instruct
      env_key: OPENROUTER_API_KEY
      timeout_s: 60
      max_tokens: 4096
    - id: openrouter-mistral-free
      litellm_model: openrouter/mistralai/mistral-7b-instruct:free
      env_key: OPENROUTER_API_KEY
      timeout_s: 60
      max_tokens: 4096

  reasoning:
    - id: hf-deepseek-r1
      litellm_model: huggingface/deepseek-ai/DeepSeek-R1
      env_key: HF_TOKEN
      timeout_s: 120
      max_tokens: 8192
    - id: openrouter-deepseek-r1
      litellm_model: openrouter/deepseek/deepseek-r1
      env_key: OPENROUTER_API_KEY
      timeout_s: 120
      max_tokens: 8192
    - id: openrouter-deepseek-r1-free
      litellm_model: openrouter/deepseek/deepseek-r1:free
      env_key: OPENROUTER_API_KEY
      timeout_s: 120
      max_tokens: 8192
    - id: hf-gpt-oss-reasoning
      litellm_model: huggingface/openai/gpt-oss-120b
      env_key: HF_TOKEN
      timeout_s: 90
      max_tokens: 8192
    - id: gemini-flash-reasoning
      litellm_model: gemini/gemini-2.5-flash
      env_key: GEMINI_API_KEY
      supports_vision: true
      timeout_s: 90
      max_tokens: 8192
    - id: openrouter-gemini-vision
      litellm_model: openrouter/google/gemini-2.5-flash
      env_key: OPENROUTER_API_KEY
      supports_vision: true
      timeout_s: 60
      max_tokens: 4096
